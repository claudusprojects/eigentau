<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040406;color:#F0F0F2;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:60px 24px}
h1{font-family:'Instrument Serif',serif;font-size:32px;font-style:italic;text-align:center;margin-bottom:8px}
.sub{text-align:center;color:#55556A;font-size:13px;margin-bottom:60px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1000px;margin:0 auto}
.card{background:#0C0C12;border:1px solid #181822;border-radius:16px;padding:36px 24px 28px;text-align:center;transition:border-color .3s}
.card:hover{border-color:#00DBBC}
.num{font-family:'JetBrains Mono',monospace;font-size:10px;color:#00DBBC;letter-spacing:.1em;margin-bottom:24px}
.logo-area{height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.sm{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.sm span{font-size:9px;color:#55556A;font-family:'JetBrains Mono',monospace}
.lockup{display:flex;align-items:center;justify-content:center;gap:10px;padding-top:16px;border-top:1px solid #181822}
.lockup .t{font-family:'Instrument Serif',serif;font-style:italic;font-size:20px;color:#F0F0F2}
</style>
</head>
