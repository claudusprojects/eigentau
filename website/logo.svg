    M 8 8
    C 8 8, 20 2, 60 2
    C 100 2, 112 8, 112 8
    L 114 14
    C 114 20, 108 28, 98 32
    L 76 38
    L 76 110
    C 76 122, 68 132, 60 136
    C 52 132, 44 122, 44 110
    L 44 38
    L 22 32
    C 12 28, 6 20, 6 14
    Z
  " fill="#00DBBC"/>

  <!-- Subtle inner shadow/depth line -->
  <path d="
    M 44 38
    L 44 110
    C 44 120, 50 128, 56 132
  " stroke="rgba(0,0,0,.15)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Highlight edge on crossbar -->
